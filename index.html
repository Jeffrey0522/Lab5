<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex - CRUD API REST</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Pokédex - Gestor de Pokémon</h1>
        </header>

        <div class="main-content">
            <section class="form-section">
                <div class="form-container">
                    <h2>Agregar/Editar Pokémon</h2>
                    
                    <form id="pokemonForm" class="form">
                        <input type="hidden" id="pokemonId" value="">
                        
                        <div class="form-group">
                            <label for="nombre">Nombre:</label>
                            <input 
                                type="text" 
                                id="nombre" 
                                placeholder="Ej: Pikachu" 
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="tipo">Tipo:</label>
                            <select id="tipo" required>
                                <option value="">Selecciona un tipo</option>
                                <option value="Fuego">Fuego</option>
                                <option value="Agua">Agua</option>
                                <option value="Planta">Planta</option>
                                <option value="Eléctrico">Eléctrico</option>
                                <option value="Normal">Normal</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="peso">Peso (kg):</label>
                            <input 
                                type="number" 
                                id="peso" 
                                placeholder="Ej: 6.0" 
                                step="0.1"
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="altura">Altura (m):</label>
                            <input 
                                type="number" 
                                id="altura" 
                                placeholder="Ej: 0.4" 
                                step="0.1"
                                required
                            >
                        </div>

                        <div class="form-buttons">
                            <button type="submit" id="submitBtn" class="btn btn-primary">
                                Crear Pokémon
                            </button>
                            <button type="button" id="cancelBtn" class="btn btn-secondary" style="display: none;">
                                Cancelar
                            </button>
                        </div>
                    </form>
                </div>

                <div class="search-container">
                    <h3>Buscar Pokémon</h3>
                    <div class="search-box">
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="Buscar por nombre..."
                            class="search-input"
                        >
                        <button id="searchBtn" class="btn btn-search">Buscar</button>
                        <button id="resetBtn" class="btn btn-reset">Mostrar Todo</button>
                    </div>
                </div>
            </section>

            <section class="list-section">
                <h2>Lista de Pokémon</h2>
                
                <div id="loadingMessage" class="loading" style="display: none;">
                    Cargando pokémon...
                </div>

                <div id="emptyMessage" class="empty-message" style="display: none;">
                    <p>No hay pokémon para mostrar</p>
                </div>

                <div id="pokemonList" class="pokemon-grid">
                    <!-- Los pokémon se cargarán aquí -->
                </div>
            </section>
        </div>
    </div>

    <div id="deleteModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Confirmar eliminación</h3>
            <p id="deleteMessage"></p>
            <div class="modal-buttons">
                <button id="confirmDeleteBtn" class="btn btn-danger">Eliminar</button>
                <button id="cancelDeleteBtn" class="btn btn-secondary">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="notification" class="notification" style="display: none;"></div>

    <script src="js/app.js"></script>
</body>
</html>
